<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Waitlist</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        /* --- WAITLIST SPECIFIC STYLES --- */
        .waitlist-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .search-container {
            position: relative;
            width: 350px;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #2563eb;
        }

        /* Empty State Box from Figma */
        .empty-state-container {
            width: 100%;
            height: 400px;
            border: 2px dashed #e2e8f0;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(248, 250, 252, 0.5);
            margin-top: 20px;
        }

        .empty-icon-circle {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .empty-icon-circle i {
            font-size: 32px;
            color: #3b82f6;
            opacity: 0.6;
        }

        .empty-state-container h2 {
            font-size: 20px;
            color: #1e293b;
            margin: 0 0 8px 0;
        }

        .empty-state-container p {
            font-size: 14px;
            color: #64748b;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="applogo(2).png" alt="Logo" class="logo-icon">
                <h2 class="brand-name">Library Learning Management Hub</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item"><a href="admin_dashboard.html"><i class="fi fi-rr-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a href="admin_catalog.html"><i class="fi fi-rr-search"></i> Catalog</a></li>
                    <li class="nav-item"><a href="admin_users.html"><i class="fi fi-rr-users-alt"></i> Users</a></li>
                    <li class="nav-item active"><a href="#"><i class="fi fi-rr-clock"></i> Waitlist</a></li>
                    <li class="nav-item"><a href="admin_settings.html"><i class="fi fi-rr-settings"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="admin-profile">
                    <strong>Admin User</strong><br><small>Admin</small>
                </div>
                <a href="login.html" class="logout-link"><i class="fi fi-rr-exit"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="waitlist-header">
                <div class="title-group">
                    <h1 style="font-size: 28px; margin: 0;">Waitlist Management</h1>
                    <p style="color: #64748b; margin: 4px 0 0;">0 books with 0 total waiting patrons</p>
                </div>
                
                <div class="search-container">
                    <i class="fi fi-rr-search"></i>
                    <input type="text" class="search-input" placeholder="Search by title or author...">
                </div>
            </div>

            <div class="empty-state-container">
                <div class="empty-icon-circle">
                    <i class="fi fi-rr-clock"></i>
                </div>
                <h2>No Active Waitlists</h2>
                <p>No books currently have users on their waitlist.</p>
            </div>
        </main>
    </div>
</body>
</html>
